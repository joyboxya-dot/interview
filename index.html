    function isGlueWord(clean) {
        if (!clean) return true;
        if (GLUE_WORDS.has(clean)) return true;
        if (clean.length <= 2 && clean !== 'nps') return true;
        return false;
    }

    function renderReadingGuideBeatWord(token) {
        const m = token.match(/^([^A-Za-z]*)([A-Za-z]+)([^A-Za-z]*)$/);
        if (!m) return escapeHtml(token);
        const clean = m[2].toLowerCase();
        const inner = stressDict[clean]
            ? stressHtmlToSyllableDisplay(stressDict[clean], true)
            : escapeHtml(m[2]);
        return escapeHtml(m[1]) + inner + escapeHtml(m[3]);
    }

    function buildReadingGuideChunkHtml(chunkText) {
        const tokens = chunkText.trim().split(/\s+/).filter(Boolean);
        if (!tokens.length) return '';
        let html = '';
        let i = 0;
        while (i < tokens.length) {
            const clean = tokens[i].replace(/[^a-zA-Z]/g, '').toLowerCase();
            const glue = isGlueWord(clean);
            let j = i + 1;
            while (j < tokens.length) {
                const cj = tokens[j].replace(/[^a-zA-Z]/g, '').toLowerCase();
                if (isGlueWord(cj) !== glue) break;
                j++;
            }
            const group = tokens.slice(i, j);
            if (glue) {
                html += '<span class="rg-glue">' + group.map(function (t) { return escapeHtml(t); }).join(' ') + '</span>';
            } else {
                html +=
                    '<span class="rg-beat">' +
                    group.map(renderReadingGuideBeatWord).join(' ') +
                    '</span>';
            }
            if (j < tokens.length) html += ' ';
            i = j;
        }
        return '<div class="reading-chunk">' + html + '</div>';
    }

    function buildReadingGuideHtml(sentEng) {
        if (typeof ReadingGuide !== 'undefined' && ReadingGuide.buildReadingGuideHtml) {
            const sent = typeof sentEng === 'string' ? { en: sentEng } : sentEng;
            return ReadingGuide.buildReadingGuideHtml(sent, stressDict);
        }
        const marked = addPauseSlashes(sentEng);
        const rawChunks = marked.split(/\s+\/\s+/).map(function (s) { return s.trim(); }).filter(Boolean);
        const chunks = rawChunks.length ? rawChunks : [marked.trim()];
        let body = '<div class="reading-chunks">';
        chunks.forEach(function (chunk, idx) {
            if (idx > 0) {
                body += '<div class="reading-pause" title="여기서 1초 쉬기">⏸ 1.0초 쉼</div>';
            }
            body += buildReadingGuideChunkHtml(chunk);
        });
        body += '</div>';
        return (
            '<div class="reading-guide-title">📖 읽기 지도 (말하기 전)</div>' +
            '<p class="reading-guide-legend">' +
            '<span class="rg-glue">작·회색</span> = 빠르게 지나가기 · ' +
            '<span class="rg-beat">크·굵게</span> = 세게·길게 · ' +
            '<span class="reading-pause-inline">⏸</span> = 1초 멈춤' +
            '</p>' +
            body
        );
    }

    function buildBracketFeedbackHtml(targetStr, cleanSpokenArr) {
        const tokens = targetStr.split(/\s+/).filter(Boolean);
        const spoken = [...cleanSpokenArr];
        const parts = [];

        for (let i = 0; i < tokens.length; i++) {
            const tw = tokens[i];
            const ct = cleanWordToken(tw);
            const displayWord = escapeHtml(wordToStressCaps(tw));

            if (spoken.length && spoken[0] === ct) {
                parts.push(displayWord);
                spoken.shift();
                continue;
            }

            let spokenGuess = null;
            if (spoken.length) {
                const cand = spoken[0];
                const future = tokens.slice(i + 1).map(cleanWordToken);
                if (!future.includes(cand)) {
                    spokenGuess = cand;
                    spoken.shift();
                }
            }

            if (!spokenGuess && IGNORE_ALIGN.has(ct)) {
                parts.push(displayWord);
                continue;
            }

            const bracket = spokenGuess ? '[' + escapeHtml(spokenGuess) + ']' : '[-]';
            parts.push(displayWord + '<span class="bracket-mistake">' + bracket + '</span>');
        }

        spoken.forEach(function(extra) {
            parts.push('<span class="bracket-mistake">[+' + escapeHtml(extra) + ']</span>');
        });

        return parts.join(' ');
    }
    
    function sanitizeForTTS(text) {
        let words = text.split(' ');
        let result = words.map(w => {
            let pureWord = w.replace(/[^a-zA-Z]/g, '');
            if (pureWord.length > 1 && pureWord === pureWord.toUpperCase()) return w;
            return w.toLowerCase();
        }).join(' ');
        result = result.replace(/\./g, '.  ').replace(/,/g, ',  ');
        return result;
    }

    function speakTextBrowser(text, lang, callback, exaggerated) {
        speechSynthesis.cancel();
        const ttsRates = typeof window.getTtsPlaybackRates === 'function'
            ? window.getTtsPlaybackRates()
            : { browserNormal: 0.78, browserPractice: 0.22 };
        const safeText = lang === 'en' ? sanitizeForTTS(text) : text;
        const utter = new SpeechSynthesisUtterance(safeText);
        if (lang === 'en') {
            utter.lang = 'en-US';
            if (exaggerated) {
                utter.rate = ttsRates.browserPractice;
                utter.pitch = 1.25;
                utter.volume = 1;
            } else {
                utter.rate = ttsRates.browserNormal;
                utter.pitch = 1.08;
            }
            if (femaleEngVoice) utter.voice = femaleEngVoice;
        } else {
            utter.lang = 'ko-KR';
            utter.rate = exaggerated ? ttsRates.browserPractice : ttsRates.browserNormal;
            utter.pitch = exaggerated ? 1.2 : 0.95;
            if (femaleKorVoice) utter.voice = femaleKorVoice;
        }
        if (callback) utter.onend = callback;
        speechSynthesis.speak(utter);
    }

    function speakText(text, lang, callback) {
        lang = lang || 'en';
        if (typeof AzureTts !== 'undefined' && AzureTts.isTtsReady()) {
            AzureTts.speak(text, lang, callback || null);
            return;
        }
        speakTextBrowser(text, lang, callback || null);
    }

    function speakPracticeWord(word, callback) {
        if (typeof AzureTts !== 'undefined' && AzureTts.speakPractice) {
            AzureTts.speakPractice(word, callback || null);
            return;
        }
        stopAllPlayback();
        speakTextBrowser(word, 'en', callback || null, true);
    }

    function playMissedWordsOneByOne(words, index) {
        if (index >= words.length) return;
        speakPracticeWord(words[index], function () {
            if (index + 1 < words.length) {
                const t = setTimeout(function () {
                    playMissedWordsOneByOne(words, index + 1);
                }, 400);
                missedWordPlayTimers.push(t);
            }
        });
    }

    function autoPlayMissedWords(wordsArray) {
        clearMissedWordPlayTimers();
        if (!wordsArray || !wordsArray.length) return;
        playMissedWordsOneByOne(wordsArray, 0);
    }

    window.speakExaggeratedWord = function(word) {
        clearMissedWordPlayTimers();
        speakPracticeWord(word);
    }

    function appendRecordingPlaybackButtons() {
        if (isMobile) return;
        fbBtnGroup.innerHTML +=
            '<button type="button" class="btn-play-audio" onclick="playFirstAudio()">🎧 최초 녹음 <span class="shortcut-key" style="margin-left:5px; font-size:12px; background:rgba(0,0,0,0.2);">←</span></button>' +
            '<button type="button" class="btn-play-audio" onclick="playUserAudio()">🎧 최근 녹음 <span class="shortcut-key" style="margin-left:5px; font-size:12px; background:rgba(0,0,0,0.2);">→</span></button>';
    }

    window.playFirstAudio = function() {
        if (everFirstAudioUrl) {
            playAudioUrl(everFirstAudioUrl);
        }
    };

    window.playUserAudio = function() {
        if (userAudioUrl) {
            playAudioUrl(userAudioUrl);
        }
    };

    async function stopRecordingAndEvaluate(textToEval) {
        if(!isRecording) return;
        const wasAzure = useAzureMic;
        const evalPhase = mPhase;
        isRecording = false;
        useAzureMic = false;
        clearTimeout(recordTimer);
        
        btnMic.innerHTML = "🎤 다시 말하기 <span class='shortcut-key' style='margin-left:8px; background:rgba(0,0,0,0.2);'>Enter</span>";
        btnMic.classList.remove('recording');

        if (!wasAzure) {
            try { recognition.stop(); } catch(e){}
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                try { mediaRecorder.stop(); } catch(e){}
            }
        }

        if (wasAzure && evalPhase >= 2 && evalPhase <= 6 && typeof AzureSpeech !== 'undefined') {
            fbBox.style.display = 'block';
            fbBox.className = 'feedback';
            fbRes.innerHTML = '<div class="listening-hint">Azure 채점 중… (Short Audio)</div>';
            window._azureAssessTrimNote = '';
            try {
                let wav = await stopMediaRecorderAndGetWav();
                let refForAzure = (currentTargetEng || '').replace(/\s+/g, ' ').trim();
                if (!refForAzure && evalPhase === 2 && db[currentTopicIndex]) {
                    const sent = db[currentTopicIndex].sentences[mSentIdx];
                    refForAzure = (sent && sent[1] ? sent[1] : getSentenceTextForKey(getRecordingKey())).replace(/\s+/g, ' ').trim();
                }
                if (!refForAzure) {
                    fbBox.className = 'feedback fail';
                    fbRes.innerHTML = '채점할 영어 문장이 없습니다. 페이지를 새로고침 후 2단계부터 다시 시도하세요.';
                    return;
                }
                if (typeof AudioWav !== 'undefined' && AudioWav.getWavDurationSec && evalPhase >= 3) {
                    const dur = await AudioWav.getWavDurationSec(wav);
                    const AZURE_PRONOUNCE_MAX_SEC = 30;
                    if (dur > AZURE_PRONOUNCE_MAX_SEC + 0.5) {
                        wav = await AudioWav.trimWavToMaxSeconds(wav, AZURE_PRONOUNCE_MAX_SEC);
                        window._azureAssessTrimNote =
                            '통문장 녹음은 전체 저장 · Azure 발음 채점은 앞 ' + AZURE_PRONOUNCE_MAX_SEC +
                            '초만 적용됩니다. (Azure Short Audio 한도)';
                    }
                }
                const assessment = await AzureSpeech.assessWavBlob(wav, refForAzure);
                if (!assessment || !hasRecognizedSpeech(assessment.text, assessment.words)) {
                    fbBox.className = 'feedback fail';
                    fbRes.innerHTML = '음성이 감지되지 않았습니다. 문장을 끝까지 말한 뒤 Enter로 다시 시도하세요.';
                    return;
                }
                evaluateAnswerFromAzure(assessment);
            } catch (e) {
                console.warn('Short Audio assess failed', e);
                const detail = (e && e.message) ? e.message : String(e);
                fbBox.className = 'feedback fail';
                fbRes.innerHTML =
                    'Azure 채점 실패: ' + detail +
                    '<br><span style="font-weight:500;font-size:12px;">' +
                    '같은 사이트 주소로 열었는지, 마이크 허용·1초 이상 녹음 후 종료했는지 확인하세요.</span>';
                if (detail === 'empty_audio' || detail === 'not_recording') {
                    alert('녹음 데이터가 비었습니다. 말하기를 시작한 뒤 1~2초 이상 말하고 Enter로 종료하세요.');
                } else if (detail === 'assess_timeout') {
                    alert('채점 시간이 초과되었습니다. Render 첫 요청은 30초 걸릴 수 있어요. 잠시 후 다시 시도하세요.');
                } else if (detail.indexOf('InitialSilenceTimeout') !== -1 || detail.indexOf('말소리') !== -1) {
                    alert('마이크에 소리가 들어가지 않았습니다. 1~2초 이상 크게 말한 뒤 종료하세요.');
                } else if (detail.indexOf('Failed to fetch') !== -1 || detail === 'assess_bad_response') {
                    alert('서버에 연결되지 않습니다. 페이지를 새로고침한 뒤 다시 시도하세요.');
                } else {
                    alert('Azure 채점 실패: ' + detail);
                }
            }
            return;
        }

        if (evalPhase === 2) {
            evaluateAnswer(textToEval);
        } else if (evalPhase >= 3) {
            evaluateAnswerRecall(textToEval);
        }
    }

    async function handleMicClick() {
        if(isRecording) {
            await stopRecordingAndEvaluate(finalTranscript + ' ' + currentInterim);
        } else {
            stopAllPlayback();
            finalTranscript = '';
            currentInterim = '';
            currentMissedWordsList = [];
            
            useAzureMic = typeof AzureSpeech !== 'undefined' && AzureSpeech.shouldUseAzureForPhase(mPhase);
            recordingSaveKey = getRecordingKey();
            recordStartedAt = Date.now();

            if (useAzureMic) {
                try {
                    await initAudioStream();
                    if (!globalAudioStream) throw new Error('no_mic');
                    audioChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm';
                    mediaRecorder = new MediaRecorder(globalAudioStream, { mimeType: mimeType });
                    mediaRecorder.ondataavailable = function (e) {
                        if (e.data.size > 0) {
                            audioChunks.push(e.data);
                            markSpeechStarted();
                        }
                    };
                    mediaRecorder.start(250);
                    btnMic.innerHTML = "🛑 말하는 중... (클릭/Enter로 종료)";
                    btnMic.classList.add('recording');
                    isRecording = true;
                    fbBox.style.display = 'block';
                    fbBox.className = 'feedback';
                    const azureHint = isRecallManualEndPhase()
                        ? '듣는 중… 통문장을 <b>다 말한 뒤 Enter</b> · Azure 채점 (통문장 30초 초과 시 앞 30초만)'
                        : '듣는 중… 끝나면 <b>Enter</b> · Azure Short Audio 채점';
                    fbRes.innerHTML = '<div class="listening-hint">' + azureHint + '</div>';
                    clearTimeout(recordTimer);
                    const maxWaitTime = getRecordingMaxWaitMs();
                    recordTimer = setTimeout(function () {
                        if (isRecording) stopRecordingAndEvaluate('');
                    }, maxWaitTime);
                } catch (e) {
                    console.warn('Azure Short Audio record failed', e);
                    useAzureMic = false;
                    startBrowserRecognition();
                }
            } else {
                if (globalAudioStream) {
                    audioChunks = [];
                    mediaRecorder = new MediaRecorder(globalAudioStream);
                    mediaRecorder.ondataavailable = function (e) {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };
                    mediaRecorder.onstop = function () {
                        saveRecordingToArchive();
                    };
                    mediaRecorder.start(250);
                }
                startBrowserRecognition();
            }
        }
    }

    function startBrowserRecognition() {
        try {
            recognition.start();
            btnMic.innerHTML = "🛑 말하는 중... (클릭/Enter로 종료)";
            btnMic.classList.add('recording');
            isRecording = true;
            clearTimeout(recordTimer);
            const maxWaitTime = getRecordingMaxWaitMs();
            recordTimer = setTimeout(function() {
                if (isRecording) stopRecordingAndEvaluate(finalTranscript + ' ' + currentInterim);
            }, maxWaitTime);
            if (isRecallManualEndPhase()) {
                fbBox.style.display = 'block';
                fbBox.className = 'feedback';
                fbRes.innerHTML = '<div class="listening-hint">듣는 중… 통문장을 <b>다 말한 뒤 Enter</b>로 점검 (최대 ' +
                    Math.round(maxWaitTime / 60000) + '분)</div>';
            } else {
                fbBox.style.display = 'none';
            }
        } catch(e) {
            alert("마이크 권한이 필요합니다. 브라우저 설정을 확인해주세요.");
        }
    }

    function restartRecognitionIfRecallRecording() {
        if (!isRecording || useAzureMic || !isRecallManualEndPhase()) return;
        try {
            recognition.start();
        } catch (e) {
            setTimeout(function() {
                if (isRecording && !useAzureMic && isRecallManualEndPhase()) {
                    try { recognition.start(); } catch (e2) {}
                }
            }, 250);
        }
    }

    recognition.onresult = function(event) {
        if (!isRecording) return;
        markSpeechStarted();
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
            else interim += event.results[i][0].transcript;
        }
        currentInterim = interim; 
        
        let fullSpoken = finalTranscript + interim;
        fbBox.style.display = 'block';
        fbBox.className = 'feedback';

        let targetWords = currentTargetEng.toLowerCase().replace(/-/g, ' ').replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(Boolean);
        let spokenWords = fullSpoken.toLowerCase().replace(/-/g, ' ').replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(Boolean);
        let lastTargetWord = targetWords[targetWords.length - 1];
        
        if (useAzureMic) return;

        if (isRecallManualEndPhase()) {
            const pct = targetWords.length
                ? Math.min(100, Math.round((spokenWords.length / targetWords.length) * 100))
                : 0;
            fbRes.innerHTML = '<div class="listening-hint">듣는 중… 약 ' + spokenWords.length + ' / ' + targetWords.length +
                ' 단어 (' + pct + '%) · <b>다 말한 뒤 Enter</b>로 점검</div>';
            return;
        }

        fbRes.innerHTML = '<div class="listening-hint">듣는 중…</div>';
        if (spokenWords.length >= targetWords.length * 0.8 && spokenWords.includes(lastTargetWord)) {
            stopRecordingAndEvaluate(fullSpoken);
        }
    };

    recognition.onend = function() {
        if (!isRecording || useAzureMic) return;
        if (isRecallManualEndPhase()) {
            restartRecognitionIfRecallRecording();
            return;
        }
        stopRecordingAndEvaluate(finalTranscript + ' ' + currentInterim);
    };

    function evaluateAnswer(spokenText) {
        if(!spokenText.trim()) {
            alert("음성이 감지되지 않았습니다. Enter를 눌러 다시 시도하세요.");
            return;
        }

        const cleanSpoken = spokenText.toLowerCase().replace(/-/g, ' ').replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(Boolean);
        const cleanTarget = currentTargetEng.toLowerCase().replace(/-/g, ' ').replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(Boolean);
        
        let matchCount = 0;
        let missedWords = [];
        let tempSpoken = [...cleanSpoken]; 

        cleanTarget.forEach(word => {
            const index = tempSpoken.indexOf(word);
            if(index !== -1) { matchCount++; tempSpoken.splice(index, 1); } 
            else { missedWords.push(word); }
        });

        //const threshold = mPhase >= 3 ? 75 : 80;
        const threshold = 100;
        const matchRate = Math.round((matchCount / cleanTarget.length) * 100);
        let coreMissed = missedWords.filter(w => w.length >= 2 && !IGNORE_ALIGN.has(w));
        let uniqueMissed = [...new Set(coreMissed)]; 
        
        currentMissedWordsList = uniqueMissed; 

        let isPass = (matchRate >= threshold) && (uniqueMissed.length === 0);

        function buildMissedWordBtnsHtml(words) {
            if (!words.length) return '';
            const chips = words.map(function(word, idx) {
                const safe = word.replace(/'/g, "\\'");
                return `<button type="button" class="missed-word-chip" onclick="speakExaggeratedWord('${safe}')">${word}<span class="shortcut-key">${idx + 1}</span></button>`;
            }).join('');
            return `<div class="missed-word-btns">${chips}</div>`;
        }

        const bracketLine = buildBracketFeedbackHtml(currentTargetEng, cleanSpoken);
        let resHtml = '';
        if (!isPass) {
            resHtml = `<div class="bracket-feedback-line">${bracketLine}</div>${buildMissedWordBtnsHtml(uniqueMissed)}`;
        }
        
        fbBox.style.display = 'block';
        fbBtnGroup.innerHTML = '';
        appendRecordingPlaybackButtons();

        const mastery = applyMasteryAfterEval(isPass);
        isPass = mastery.pass;
        if (mastery.fluHint) {
            resHtml += '<div style="font-size:12px;color:#B45309;margin-top:8px;">' + escapeHtml(mastery.fluHint) + '</div>';
        }
        showEvalResult(isPass, '✅ 완벽합니다 · Space로 다음', '❌ 다시 말해 보세요', resHtml, uniqueMissed);
    }

    function goHome() {
        if(isRecording) {
            stopRecordingSilently();
        }
        stopAllPlayback();
        persistProgress();
        elReviewPage.style.display = 'none';
        elDash.style.display = 'block';
        elMission.style.display = 'none';
        reviewReturnView = 'dash';
        updateDashboard();
        updateRecordingNavUi();
    }

    window.addEventListener('beforeunload', function() {
        if (elMission.style.display === 'block') persistProgress();
        if (typeof persistDashboardSettings === 'function') persistDashboardSettings();
    });

    hydrateArchiveFromIdb().then(function() {
        if (typeof DashboardSettings !== 'undefined') {
            DashboardSettings.loadAndApply();
        }
        renderDifficultyPanel();
        renderTtsSpeedPanel();
        renderL2SpeedPanel();
        renderMasteryDashPanel();
        bindContentPanelActions();
        if (typeof DashboardSettings !== 'undefined') {
            DashboardSettings.applyToUI();
        }
        updateMissionDifficultyBadge();
        const inits = [bootstrapContent()];
        if (typeof AzureSpeech !== 'undefined') {
            inits.push(AzureSpeech.initAzureSpeech());
        }
        if (typeof AzureTts !== 'undefined') {
            inits.push(AzureTts.initAzureTts());
        }
        Promise.all(inits).then(function (results) {
            if (typeof AzureSpeech !== 'undefined') {
                updateAzureStatusLabel(!!results[1]);
            } else {
                updateAzureStatusLabel(false);
            }
            updateDashboard();
        }).catch(function () {
            updateDashboard();
            updateAzureStatusLabel(false);
        });
    });
</script>
